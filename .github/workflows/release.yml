name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  # Run JS-based actions on Node 24 (Node 20 is deprecated; Node 24 is the default from 2026-06-16).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: Package & publish
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download Dalamud dev libraries
        shell: pwsh
        run: |
          $dest = "$env:AppData\XIVLauncher\addon\Hooks\dev"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Invoke-WebRequest -Uri "https://goatcorp.github.io/dalamud-distrib/latest.zip" -OutFile dalamud.zip
          Expand-Archive -Path dalamud.zip -DestinationPath $dest -Force

      - name: Build (Release)
        run: dotnet build -c Release

      - name: Stage artifact
        shell: pwsh
        run: |
          $zip = "src/EorzeaArsenalPlugin/bin/Release/EorzeaArsenalPlugin/latest.zip"
          if (-not (Test-Path $zip)) { Write-Error "Packaged zip not found at $zip"; exit 1 }
          Copy-Item $zip -Destination "latest.zip" -Force

      - name: Generate pluginmaster.json
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          ./scripts/generate-pluginmaster.ps1 -Version $version -Tag "${{ github.ref_name }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.zip
          generate_release_notes: true

      - name: Commit pluginmaster.json to main
        shell: pwsh
        run: |
          git config user.name "Michael Tosch"
          git config user.email "m.tosch@miralsoft.com"
          git fetch origin main
          git checkout main
          Copy-Item pluginmaster.json -Destination pluginmaster.json -Force
          git add pluginmaster.json
          if (git diff --cached --quiet) { Write-Host "No pluginmaster changes."; exit 0 }
          git commit -m "chore(release): update pluginmaster for ${{ github.ref_name }}"
          git push origin main
