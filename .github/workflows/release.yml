name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  # Run JS-based actions on Node 24 (Node 20 is deprecated; Node 24 is the default from 2026-06-16).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: Package & publish
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: "10.0.x"

      - name: Download Dalamud dev libraries
        shell: pwsh
        run: |
          $dest = "$env:AppData\XIVLauncher\addon\Hooks\dev"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Invoke-WebRequest -Uri "https://goatcorp.github.io/dalamud-distrib/latest.zip" -OutFile dalamud.zip
          Expand-Archive -Path dalamud.zip -DestinationPath $dest -Force

      - name: Build (Release)
        run: dotnet build -c Release

      - name: Stage artifact
        shell: pwsh
        run: |
          $zip = "src/EorzeaArsenalPlugin/bin/Release/EorzeaArsenalPlugin/latest.zip"
          if (-not (Test-Path $zip)) { Write-Error "Packaged zip not found at $zip"; exit 1 }
          Copy-Item $zip -Destination "latest.zip" -Force

      - name: Generate pluginmaster.json
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          ./scripts/generate-pluginmaster.ps1 -Version $version -Tag "${{ github.ref_name }}"

      # Both the manifest and the binary are published as release assets and served via the stable
      # `releases/latest/download/<asset>` redirect. This means the workflow never pushes to `main`
      # (so `main` can be fully branch-protected) and the public custom-repo URL never changes:
      #   https://github.com/<owner>/<repo>/releases/latest/download/pluginmaster.json
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            latest.zip
            pluginmaster.json
          generate_release_notes: true
